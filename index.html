<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f766e">
  <title>Milk Hisab</title>
  <style>
    :root {
      --primary: #0f766e; --primary-hover: #0d655d;
      --bg: #f0fdf4; --card: #ffffff; --text: #022c22; --muted: #4b5563;
      --border: #d1d5db; --accent: #f59e0b; --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background: var(--bg); color: var(--text); }
    
    .container { max-width: 480px; margin: 0 auto; padding: 12px; }
    h1 { text-align: center; margin: 10px 0 16px; color: var(--primary); font-size: 1.4rem; }
    
    .card { background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    label { display: block; font-weight: 500; margin: 8px 0 4px; font-size: 0.85rem; color: var(--muted); }
    input, select {
      width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 1rem; background: #fafafa;
    }
    input:focus, select:focus { outline: none; border-color: var(--primary); background: #fff; }
    
    .row { display: flex; gap: 10px; margin-bottom: 4px; }
    .row > * { flex: 1; }
    
    button {
      width: 100%; padding: 13px; border: none; border-radius: 8px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 10px;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: #e5e7eb; color: var(--text); margin-top: 8px; }
    .btn-accent { background: var(--accent); color: #000; margin-top: 8px; }
    .btn-danger { background: #fee2e2; color: var(--danger); width: auto; padding: 6px 10px; font-size: 0.8rem; margin: 0; }
    .btn-clear { background: #fecaca; color: #b91c1c; margin-top: 12px; }
    
    .tab-bar { display: flex; background: var(--card); border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
    .tab { flex: 1; padding: 12px; text-align: center; font-weight: 500; cursor: pointer; border-bottom: 3px solid transparent; }
    .tab.active { background: #ecfdf5; color: var(--primary); border-bottom-color: var(--primary); }
    
    .hidden { display: none !important; }
    table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.85rem; }
    th, td { padding: 9px 8px; text-align: left; border-bottom: 1px solid #e5e7eb; }
    th { color: var(--muted); font-weight: 500; background: #f9fafb; }
    .is-exception { background: #fff7ed; }
        .summary { display: flex; justify-content: space-between; padding: 12px 0; border-top: 2px dashed var(--border); margin-top: 8px; font-weight: 600; }
    .summary div { text-align: center; }
    .summary span { display: block; font-size: 0.75rem; color: var(--muted); font-weight: 400; }
    
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: #0f172a; color: white; padding: 12px 18px; border-radius: 24px;
      font-size: 0.85rem; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 99;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.error { background: #ef4444; }
    .toast.success { background: #059669; }
    
    .warning-box {
      background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px;
      padding: 12px; margin-top: 8px; font-size: 0.8rem; color: #991b1b;
    }

    /* Simple Modal */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    
    .modal {
      background: white; border-radius: 16px; padding: 24px;
      width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .modal-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 8px; }
    .modal-message { color: var(--muted); margin-bottom: 16px; }
    
    .modal-input {
      width: 100%; padding: 12px; border: 2px solid var(--border);
      border-radius: 10px; font-size: 1rem; margin-bottom: 16px;
    }
    .modal-input:focus { outline: none; border-color: var(--primary); }
    
    .modal-buttons { display: flex; gap: 12px; }
    .modal-buttons button { flex: 1; margin-top: 0; padding: 12px; }
    .modal-cancel { background: #f3f4f6; color: var(--text); }
    .modal-ok { background: var(--primary); color: white; }
  </style>
</head>
<body>
  <div class="container">    <h1>🥛 Milk Hisab</h1>
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('setup')">⚙️ Setup & Exceptions</div>
      <div class="tab" onclick="switchTab('report')">📊 Report & PDF</div>
    </div>

    <div id="setup-tab">
      <div class="card">
        <h3 style="margin-bottom:8px;">Customer Profile</h3>
        <div class="row">
          <select id="cust-select"><option value="">Select Customer</option></select>
          <button id="add-cust-btn" class="btn-secondary" style="margin-top:0; width:auto;">+ New</button>
        </div>
        <div class="row">
          <div><label>Default Liters/Day</label><input type="number" id="def-liters" step="0.1" min="0"></div>
          <div><label>Price / Liter (₹)</label><input type="number" id="def-price" step="0.1" min="0"></div>
        </div>
        <label>Start Date</label>
        <input type="date" id="start-date">
        <button id="save-profile-btn" class="btn-primary">💾 Save Profile</button>
      </div>

      <div class="card">
        <h3 style="margin-bottom:8px;">Add Date Exception</h3>
        <div class="row">
          <div><label>Date</label><input type="date" id="exc-date"></div>
          <div><label>Liters</label><input type="number" id="exc-liters" step="0.1" min="0"></div>
        </div>
        <div class="row">
          <div><label>Price/L (₹)</label><input type="number" id="exc-price" step="0.1" min="0"></div>
          <div><label>Note</label><input type="text" id="exc-note" placeholder="Holiday, less, etc."></div>
        </div>
        <button id="add-exc-btn" class="btn-accent">➕ Add Exception</button>
      </div>

      <div class="card">
        <h3 style="margin-bottom:8px; color:var(--danger);">🗑️ Danger Zone</h3>
        <div class="warning-box">⚠️ This cannot be undone. Backup first if needed.</div>
        <button id="clear-all-btn" class="btn-clear">🗑️ Clear All Data</button>
      </div>
    </div>

    <div id="report-tab" class="hidden">
      <div class="card">
        <label>Select Customer</label>
        <select id="rep-cust-select"><option value="">Choose...</option></select>
        <div class="row" style="margin-top:8px;">
          <div><label>From Date</label><input type="date" id="rep-from"></div>
          <div><label>To Date</label><input type="date" id="rep-to"></div>
        </div>        <button id="generate-btn" class="btn-primary">📅 Generate Report</button>
      </div>

      <div class="card" id="report-result" style="display:none;">
        <div style="overflow-x:auto;">
          <table>
            <thead><tr><th>Date</th><th>Liters</th><th>Price</th><th>Total</th><th></th></tr></thead>
            <tbody id="rep-tbody"></tbody>
          </table>
        </div>
        <div class="summary">
          <div><span>Days</span><strong id="sum-days">0</strong></div>
          <div><span>Total L</span><strong id="sum-liters">0</strong></div>
          <div><span>Total ₹</span><strong id="sum-amount">0</strong></div>
        </div>
        <button id="pdf-btn" class="btn-primary">📄 Download PDF</button>
        <button id="backup-btn" class="btn-secondary">💾 Backup Data</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">Saved!</div>

  <!-- Simple Modal for Customer Name -->
  <div id="customer-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-title">Add New Customer</div>
      <div class="modal-message">Enter customer name:</div>
      <input type="text" id="customer-name-input" class="modal-input" placeholder="Customer Name">
      <div class="modal-buttons">
        <button class="modal-cancel" onclick="closeCustomerModal()">Cancel</button>
        <button class="modal-ok" onclick="saveNewCustomer()">Add Customer</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <script>
    const STORAGE = 'milk_hisab_v2';
    let state = { customers: [], exceptions: [] };
    let reportData = [];

    const $ = id => document.getElementById(id);
    
    function init() {
      loadState();
      renderCustOptions();
      $('start-date').value = new Date().toISOString().slice(0,10);      $('exc-date').value = new Date().toISOString().slice(0,10);
      
      // Event listeners
      $('add-cust-btn').onclick = openCustomerModal;
      $('save-profile-btn').onclick = saveProfile;
      $('add-exc-btn').onclick = addException;
      $('generate-btn').onclick = generateReport;
      $('pdf-btn').onclick = generatePDF;
      $('backup-btn').onclick = backupData;
      $('clear-all-btn').onclick = clearAllData;
      
      $('cust-select').onchange = function() {
        const c = state.customers.find(x => x.id === this.value);
        if (c) {
          $('def-liters').value = c.defaultLiters || '';
          $('def-price').value = c.defaultPrice || '';
          $('start-date').value = c.startDate || '';
        }
      };
      
      $('rep-tbody').onclick = function(e) {
        if (e.target.classList.contains('del-exc-btn')) {
          deleteException(parseInt(e.target.dataset.idx));
        }
      };
    }

    function loadState() {
      const s = localStorage.getItem(STORAGE);
      if (s) try { state = JSON.parse(s); } catch(e){}
    }
    function saveState() { localStorage.setItem(STORAGE, JSON.stringify(state)); }

    function renderCustOptions() {
      const opts = state.customers.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      $('cust-select').innerHTML = `<option value="">Select Customer</option>${opts}`;
      $('rep-cust-select').innerHTML = `<option value="">Choose...</option>${opts}`;
    }

    function showToast(msg, type = 'normal') {
      const t = $('toast');
      t.textContent = msg;
      t.className = 'toast show ' + (type === 'error' ? 'error' : type === 'success' ? 'success' : '');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // Simple Modal Functions - GUARANTEED TO WORK
    function openCustomerModal() {
      $('customer-name-input').value = '';
      $('customer-modal').classList.add('active');      setTimeout(() => $('customer-name-input').focus(), 100);
    }

    function closeCustomerModal() {
      $('customer-modal').classList.remove('active');
    }

    function saveNewCustomer() {
      const name = $('customer-name-input').value.trim();
      
      if (!name) {
        showToast('⚠️ Please enter a name', 'error');
        $('customer-name-input').focus();
        return;
      }
      
      // Add customer
      const newCustomer = {
        id: Date.now().toString(),
        name: name
      };
      
      state.customers.push(newCustomer);
      saveState();
      renderCustOptions();
      
      // Select the new customer
      $('cust-select').value = newCustomer.id;
      
      closeCustomerModal();
      showToast('👤 Customer Added', 'success');
    }

    // Allow Enter key to save customer
    $('customer-name-input')?.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') saveNewCustomer();
    });

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      $('setup-tab').classList.toggle('hidden', tab !== 'setup');
      $('report-tab').classList.toggle('hidden', tab !== 'report');
    }

    function saveProfile() {
      const id = $('cust-select').value;
      if (!id) return showToast('⚠️ Select a customer first', 'error');
      
      const c = state.customers.find(x => x.id === id);      c.defaultLiters = parseFloat($('def-liters').value) || 0;
      c.defaultPrice = parseFloat($('def-price').value) || 0;
      c.startDate = $('start-date').value || new Date().toISOString().slice(0,10);
      
      saveState();
      showToast('✅ Profile Saved', 'success');
    }

    function addException() {
      const custId = $('cust-select').value;
      const date = $('exc-date').value;
      const liters = parseFloat($('exc-liters').value);
      const price = parseFloat($('exc-price').value) || state.customers.find(c=>c.id===custId)?.defaultPrice || 0;
      const note = $('exc-note').value.trim();

      if (!custId || !date || isNaN(liters)) return showToast('⚠️ Fill required fields', 'error');
      
      if (state.exceptions.find(e => e.customerId === custId && e.date === date)) {
        if (!confirm('Override existing exception?')) return;
        state.exceptions = state.exceptions.filter(e => !(e.customerId === custId && e.date === date));
      }
      
      state.exceptions.push({ customerId: custId, date, liters, price, note });
      saveState();
      showToast('📝 Exception Added', 'success');
      $('exc-liters').value = '';
      $('exc-note').value = '';
    }

    function clearAllData() {
      if (!confirm('⚠️ Delete ALL data? This cannot be undone!')) return;
      localStorage.removeItem(STORAGE);
      state = { customers: [], exceptions: [] };
      renderCustOptions();
      $('def-liters').value = '';
      $('def-price').value = '';
      $('start-date').value = '';
      showToast('🗑️ All data cleared', 'success');
    }

    function getDatesInRange(start, end) {
      const dates = [];
      let d = new Date(start);
      while (d <= new Date(end)) {
        dates.push(d.toISOString().slice(0, 10));
        d.setDate(d.getDate() + 1);
      }
      return dates;
    }
    function generateReport() {
      const custId = $('rep-cust-select').value;
      const from = $('rep-from').value;
      const to = $('rep-to').value;
      
      if (!custId || !from || !to) return showToast('⚠️ Select customer & dates', 'error');
      if (from > to) return showToast('⚠️ End date must be after start', 'error');

      const cust = state.customers.find(c => c.id === custId);
      const dates = getDatesInRange(from, to);
      
      reportData = dates.map(date => {
        const exc = state.exceptions.find(e => e.customerId === custId && e.date === date);
        const liters = exc ? exc.liters : (cust.defaultLiters || 0);
        const price = exc ? exc.price : (cust.defaultPrice || 0);
        return { date, liters, price, amount: liters * price, note: exc?.note || '', isExc: !!exc };
      });

      renderTable();
      $('report-result').style.display = 'block';
      showToast('📊 Report Generated', 'success');
    }

    function renderTable() {
      $('rep-tbody').innerHTML = reportData.map((r, i) => `
        <tr class="${r.isExc ? 'is-exception' : ''}">
          <td>${formatDate(r.date)}</td>
          <td>${r.liters}</td>
          <td>₹${r.price}</td>
          <td>₹${r.amount.toFixed(2)}${r.note ? `<span class="note-tag">${r.note}</span>` : ''}</td>
          <td>${r.isExc ? '<button class="btn-danger del-exc-btn" data-idx="'+i+'">✕</button>' : ''}</td>
        </tr>
      `).join('');

      $('sum-days').textContent = reportData.length;
      $('sum-liters').textContent = reportData.reduce((s, r) => s + r.liters, 0).toFixed(1);
      $('sum-amount').textContent = reportData.reduce((s, r) => s + r.amount, 0).toFixed(2);
    }

    function deleteException(idx) {
      const r = reportData[idx];
      if (confirm(`Remove exception for ${r.date}?`)) {
        state.exceptions = state.exceptions.filter(e => !(e.customerId === $('rep-cust-select').value && e.date === r.date));
        saveState();
        generateReport();
        showToast('🗑️ Removed', 'success');
      }
    }

    function generatePDF() {      if (typeof window.jspdf === 'undefined') {
        return showToast('⚠️ PDF library loading... Try again in 2 seconds', 'error');
      }
      
      const { jsPDF } = window.jspdf;
      const cust = state.customers.find(c => c.id === $('rep-cust-select').value);
      if (!cust || reportData.length === 0) return showToast('⚠️ No data', 'error');
      
      try {
        const doc = new jsPDF();
        doc.setFontSize(16);
        doc.text(`Milk Hisab: ${cust.name}`, 14, 15);
        doc.setFontSize(10);
        doc.text(`Period: ${formatDate($('rep-from').value)} to ${formatDate($('rep-to').value)}`, 14, 22);

        const rows = reportData.map(r => [
          formatDate(r.date), `${r.liters} L`, `₹${r.price}`, `₹${r.amount.toFixed(2)}`, r.note || '-'
        ]);

        doc.autoTable({
          startY: 30,
          head: [['Date','Liters','Price/L','Amount','Note']],
          body: rows,
          theme: 'grid',
          styles: { fontSize: 9, cellPadding: 2 },
          headStyles: { fillColor: [15, 118, 110] },
          alternateRowStyles: { fillColor: [240, 253, 244] }
        });

        const finalY = doc.lastAutoTable.finalY + 10;
        doc.setFontSize(11);
        doc.text(`Total Days: ${reportData.length}`, 14, finalY);
        doc.text(`Total Liters: ${reportData.reduce((s,r)=>s+r.liters,0).toFixed(1)} L`, 14, finalY + 6);
        doc.text(`Total Amount: ₹${reportData.reduce((s,r)=>s+r.amount,0).toFixed(2)}`, 14, finalY + 12);

        const safeName = cust.name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
        doc.save(`milk-hisab-${safeName}-${$('rep-from').value}.pdf`);
        showToast('📄 PDF Downloaded', 'success');
      } catch (e) {
        showToast('❌ PDF Error: ' + e.message, 'error');
      }
    }

    function backupData() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `milk-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      showToast('💾 Backup Saved', 'success');    }

    function formatDate(d) {
      return new Date(d + 'T00:00:00').toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
    }

    init();
  </script>
</body>
</html>
